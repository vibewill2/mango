# tags rule
# Cada tag tem um layout diferente para fluxos de trabalho distintos

# Tag 1 - Geral (tile clássico: master à esquerda, stack à direita)
tagrule=id:1,layout_name:tile

# Tag 2 - Foco total (monocle: uma janela por vez, tela cheia)
tagrule=id:2,layout_name:monocle

# Tag 3 - Grade (grid: janelas em grade automática, bom para chat/multi-app)
tagrule=id:3,layout_name:grid

# Tag 4 - Navegador (scroller: rolagem horizontal, ideal para browser)
tagrule=id:4,layout_name:scroller

# Tag 5 - Baralho (deck: master visível, demais empilhadas atrás)
tagrule=id:5,layout_name:deck

# Tag 6 - Trabalho centrado (center_tile: master no centro, stack nos lados)
tagrule=id:6,layout_name:center_tile

# Tag 7 - Código (vertical_tile: master em cima, stack embaixo)
tagrule=id:7,layout_name:vertical_tile

# Tag 8 - Diestro (right_tile: master à direita, stack à esquerda)
tagrule=id:8,layout_name:right_tile

# Tag 9 - Leitura (vertical_scroller: rolagem vertical, bom para documentos)
tagrule=id:9,layout_name:vertical_scroller
